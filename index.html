<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema JJL Avícola</title>

    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 🔥 FONDO CON IMAGEN */
        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('https://grupohyt.com/images/xgranja-pollos_interior.jpg.pagespeed.ic_.ADsfVvhkxr.jpg') no-repeat center center/cover;
            
            /* 🔥 EFECTO BORROSO */
            filter: blur(8px);
            transform: scale(1.1); /* evita bordes blancos */
            z-index: -2;
        }

        /* 🔥 CAPA OSCURA ENCIMA */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: -1;
        }

        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            padding: 35px 30px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            color: #1f2937;
        }

        .divider {
            width: 40px;
            height: 3px;
            background: #f97316;
            margin: 10px auto 20px;
        }

        p {
            color: #6b7280;
            margin-bottom: 20px;
        }

        .progress {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: #f97316;
            animation: load 4s linear forwards;
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }

        .btn {
            display: inline-block;
            padding: 10px 18px;
            background: #f97316;
            color: #fff;
            border-radius: 6px;
            text-decoration: none;
        }

        .footer {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<!-- 🔥 FONDO -->
<div class="background"></div>
<div class="overlay"></div>

<div class="container">
    <h1>Sistema JJL Avícola</h1>
    <div class="divider"></div>

    <p>Inicializando plataforma...</p>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <p>Redirigiendo...</p>

    <a class="btn" href="https://script.google.com/macros/s/AKfycbx6raorZG8zueSQW7X3OZtI8cdC9kS-AhQkf8p5PGwAU4Hm93sF3Tu-Q8lI S34TDzCT6g/exec">
        Acceder
    </a>

    <div class="footer">© 2026 Sistema Avícola</div>
</div>

<script>
    setTimeout(() => {
        window.location.href = "https://script.google.com/macros/s/AKfycbx6raorZG8zueSQW7X3OZtI8cdC9kS-AhQkf8p5PGwAU4Hm93sF3Tu-Q8lIS34TDzCT6g/exec";
    }, 4000);
</script>

</body>
</html>
