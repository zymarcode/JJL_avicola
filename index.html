<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema JJL Avícola</title>

    <!-- Fuente moderna -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Fondo */
        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('https://grupohyt.com/images/xgranja-pollos_interior.jpg.pagespeed.ic_.ADsfVvhkxr.jpg') no-repeat center center/cover;
            filter: blur(10px);
            transform: scale(1.1);
            z-index: -2;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            z-index: -1;
        }

        /* Caja */
        .container {
            background: #ffffff;
            border-radius: 16px;
            padding: 40px 35px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.25);
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 🔥 LOGO CIRCULAR */
        .logo {
            width: 95px;
            height: 95px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.25);
            border: 3px solid #f97316;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            color: #111827;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.9rem;
            color: #6b7280;
            margin-bottom: 20px;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: #f97316;
            margin: 0 auto 25px;
            border-radius: 2px;
        }

        .progress {
            width: 100%;
            height: 6px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f97316, #fb923c);
            animation: load 4s linear forwards;
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }

        .status {
            font-size: 0.9rem;
            color: #4b5563;
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249,115,22,0.3);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #9ca3af;
        }
    </style>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">

    <!-- 🔥 LOGO CIRCULAR -->
    <img class="logo" src="https://www.dropbox.com/scl/fi/az34hcbvrf1ziwe69qz4x/LOGO-JJL.png?rlkey=amc68v2f4nyz4fcj5125t4gtq&st=xaaw80yb&dl=1" alt="Logo JJL">

    <h1>Sistema JJL Avícola</h1>
    <p class="subtitle">Plataforma de gestión y control</p>

    <div class="divider"></div>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <p class="status">Cargando sistema, espere un momento...</p>

    <a class="btn" href="https://script.google.com/macros/s/AKfycbx6raorZG8zueSQW7X3OZtI8cdC9kS-AhQkf8p5PGwAU4Hm93sF3Tu-Q8lIS34TDzCT6g/exec">
        Ingresar
    </a>

    <div class="footer">© 2026 JJL Avícola</div>
</div>

<script>
    setTimeout(() => {
        window.location.href = "https://script.google.com/macros/s/AKfycbx6raorZG8zueSQW7X3OZtI8cdC9kS-AhQkf8p5PGwAU4Hm93sF3Tu-Q8lIS34TDzCT6g/exec";
    }, 4000);
</script>

</body>
</html>
