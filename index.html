<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema JJL Avícola</title>

    <!-- Google Font PRO -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* 🔥 Fondo con blur */
        .background {
            position: fixed;
            width: 100%;
            height: 100%;
            background: url('https://grupohyt.com/images/xgranja-pollos_interior.jpg.pagespeed.ic_.ADsfVvhkxr.jpg') no-repeat center center/cover;
            filter: blur(10px);
            transform: scale(1.1);
            z-index: -2;
        }

        /* 🔥 Capa oscura */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: -1;
        }

        /* 🔥 Contenedor PRO */
        .container {
            backdrop-filter: blur(12px);
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 16px;
            padding: 40px 30px;
            width: 90%;
            max-width: 420px;
            text-align: center;
            color: #fff;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 1.7rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 0.95rem;
            color: rgba(255,255,255,0.7);
            margin-bottom: 25px;
        }

        .divider {
            width: 50px;
            height: 3px;
            background: #f97316;
            margin: 0 auto 25px;
            border-radius: 2px;
        }

        .progress {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 25px;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f97316, #fb923c);
            animation: load 4s linear forwards;
        }

        @keyframes load {
            from { width: 0%; }
            to { width: 100%; }
        }

        .status {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 25px;
        }

        .btn {
            display: inline-block;
            padding: 12px 22px;
            background: linear-gradient(135deg, #f97316, #ea580c);
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(249,115,22,0.4);
        }

        .footer {
            margin-top: 25px;
            font-size: 0.75rem;
            color: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

<div class="background"></div>
<div class="overlay"></div>

<div class="container">
    <h1>Sistema JJL Avícola</h1>
    <div class="divider"></div>

    <p class="subtitle">Gestión inteligente de producción avícola</p>

    <div class="progress">
        <div class="progress-bar"></div>
    </div>

    <p class="status">Cargando sistema, por favor espere...</p>

    <a class="btn" href="https://script.google.com/macros/s/AKfycbx6raorZG8zueSQW7X3OZtI8cdC9kS-AhQkf8p5PGwAU4Hm93sF3Tu-Q8lIS34TDzCT6g/exec">
        Acceder ahora
    </a>

    <div class="footer">© 2026 Sistema Avícola • Todos los derechos reservados</div>
</div>

<script>
    setTimeout(() => {
        window.location.href = "https://script.google.com/macros/s/AKfycbx6raorZG8zueSQW7X3OZtI8cdC9kS-AhQkf8p5PGwAU4Hm93sF3Tu-Q8lIS34TDzCT6g/exec";
    }, 4000);
</script>

</body>
</html>
